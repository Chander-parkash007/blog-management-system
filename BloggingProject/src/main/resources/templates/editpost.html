<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post | Modern Dashboard</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --warning-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --dark-bg: #0f0f1e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --border-glass: rgba(255, 255, 255, 0.15);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.3);
            --shadow-xl: 0 30px 90px rgba(0, 0, 0, 0.4);
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at top left, rgba(102, 126, 234, 0.15), transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(240, 147, 251, 0.15), transparent 50%),
                radial-gradient(ellipse at center, rgba(118, 75, 162, 0.1), transparent 70%);
            z-index: 0;
            animation: backgroundShift 20s ease infinite alternate;
        }
        
        @keyframes backgroundShift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-30px, 30px) scale(1.05); }
        }
        
        /* Floating Particles */
        .particle {
            position: fixed;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            animation: float linear infinite;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }
        
        /* Back Button */
        .btn-back {
            position: fixed;
            top: 30px;
            left: 30px;
            padding: 14px 28px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 50px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-5px);
            color: white;
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .page-icon {
            font-size: 4rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        
        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #c0a0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            letter-spacing: -2px;
        }
        
        .page-subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        /* Post ID Badge */
        .post-id-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 50px;
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #a0a0ff;
        }
        
        /* Form Container */
        .form-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 50px;
            box-shadow: var(--shadow-lg);
            animation: fadeInUp 0.8s ease 0.2s backwards;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .form-group {
            margin-bottom: 30px;
        }
        
        .form-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .form-label i {
            color: #764ba2;
        }
        
        .required {
            color: #f5576c;
            margin-left: 4px;
        }
        
        .form-input,
        .form-textarea {
            width: 100%;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid var(--border-glass);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }
        
        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--text-secondary);
        }
        
        .form-input:focus,
        .form-textarea:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #764ba2;
            box-shadow: 0 0 0 4px rgba(118, 75, 162, 0.1);
            transform: translateY(-2px);
        }
        
        .form-textarea {
            min-height: 200px;
            resize: vertical;
            line-height: 1.6;
        }
        
        .char-counter {
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 8px;
        }
        
        /* Form Actions */
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }
        
        .btn-submit {
            flex: 1;
            padding: 20px 40px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .btn-submit::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn-submit:hover::before {
            width: 400px;
            height: 400px;
        }
        
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }
        
        .btn-submit span {
            position: relative;
            z-index: 1;
        }
        
        .btn-cancel {
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--border-glass);
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            color: white;
        }
        
        /* Change Log */
        .changelog-section {
            background: rgba(240, 147, 251, 0.1);
            border: 1px solid rgba(240, 147, 251, 0.2);
            border-radius: 16px;
            padding: 20px 25px;
            margin-top: 30px;
            animation: fadeInUp 0.8s ease 0.4s backwards;
        }
        
        .changelog-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #f093fb;
        }
        
        .changelog-info {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        .changelog-meta {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .changelog-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .btn-back {
                position: static;
                margin-bottom: 30px;
            }
            
            .page-title {
                font-size: 2.5rem;
            }
            
            .form-container {
                padding: 30px 25px;
            }
            
            .form-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Particles -->
    <!-- Particles (unchanged) -->
    <div class="particle" style="width:3px;height:3px;left:10%;animation-duration:15s;animation-delay:0s;"></div>
    <div class="particle" style="width:2px;height:2px;left:20%;animation-duration:12s;animation-delay:2s;"></div>
    <div class="particle" style="width:4px;height:4px;left:30%;animation-duration:18s;animation-delay:4s;"></div>
    <div class="particle" style="width:2px;height:2px;left:40%;animation-duration:14s;animation-delay:1s;"></div>
    <div class="particle" style="width:3px;height:3px;left:50%;animation-duration:16s;animation-delay:3s;"></div>
    <div class="particle" style="width:2px;height:2px;left:60%;animation-duration:13s;animation-delay:5s;"></div>
    <div class="particle" style="width:4px;height:4px;left:70%;animation-duration:17s;animation-delay:2s;"></div>
    <div class="particle" style="width:3px;height:3px;left:80%;animation-duration:15s;animation-delay:4s;"></div>

    <!-- Back Button -->
    <a th:href="@{/}" class="btn-back"><i class="fas fa-arrow-left"></i> <span>Back to Homepage</span></a>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="page-icon"><i class="fas fa-edit"></i></div>
            <h1 class="page-title">Edit Post</h1>
            <p class="page-subtitle">Update Your Content</p>
            <div class="post-id-badge">
                <i class="fas fa-hashtag"></i> Post ID: <span th:text="${post.id}"></span>
            </div>
        </div>

        <!-- Form Container -->
        <div class="form-container">
            <form th:action="@{/posts/update}" method="POST" id="editPostForm">
                <input type="hidden" name="id" th:value="${post.id}">

                <div class="form-group">
                    <label class="form-label"><i class="fas fa-heading"></i> Post Title <span class="required">*</span></label>
                    <input type="text" name="title" class="form-input" placeholder="Enter an engaging title..." th:value="${post.title}" required maxlength="200">
                </div>

                <div class="form-group">
                    <label class="form-label"><i class="fas fa-user"></i> Author Name <span class="required">*</span></label>
                    <input type="text" name="author" class="form-input" placeholder="Who is writing this?" th:value="${post.author}" required maxlength="100">
                </div>

                <div class="form-group">
                    <label class="form-label"><i class="fas fa-file-alt"></i> Post Content <span class="required">*</span></label>
                    <textarea name="content" class="form-textarea" placeholder="Write your amazing content here..." required maxlength="5000" id="contentArea" th:text="${post.content}"></textarea>
                    <div class="char-counter"><span id="charCount">0</span> / 5000 characters</div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-submit"><i class="fas fa-save"></i> <span>Update Post</span></button>
                    <a th:href="@{/posts}" class="btn-cancel"><i class="fas fa-times"></i> Cancel</a>
                </div>
            </form>

            <!-- Change Log -->
        <!-- Change Log -->
<div class="changelog-section">
    <div class="changelog-title"><i class="fas fa-history"></i> Post History</div>
    <div class="changelog-info">Keep track of your changes. All updates are automatically saved and timestamped.</div>
</div>
    <script>
        const contentArea = document.getElementById('contentArea');
        const charCount = document.getElementById('charCount');

        function updateCharCount() {
            const length = contentArea.value.length;
            charCount.textContent = length;
            charCount.style.color = length > 4500 ? '#f5576c' : 'var(--text-secondary)';
        }

        updateCharCount();
        contentArea.addEventListener('input', updateCharCount);

        // Auto-resize
        contentArea.addEventListener('input', function(){ this.style.height='auto'; this.style.height=this.scrollHeight+'px'; });
        contentArea.style.height = contentArea.scrollHeight+'px';

        // Form validation
        document.getElementById('editPostForm').addEventListener('submit', function(e){
            const title = this.querySelector('input[name="title"]').value.trim();
            const author = this.querySelector('input[name="author"]').value.trim();
            const content = this.querySelector('textarea[name="content"]').value.trim();

            if(!title || !author || !content){ e.preventDefault(); alert('Please fill in all required fields!'); }
            else if(!confirm('Are you sure you want to update this post?')){ e.preventDefault(); }
        });
    </script>
</body>
</html>
